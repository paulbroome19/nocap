[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nocap-backend"
version = "0.1.0"
description = "NoCap — EBA xBRL-CSV submission platform (backend)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "openpyxl>=3.1",
    "python-multipart>=0.0.9",
    "uvicorn[standard]>=0.30",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.2",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "httpx>=0.27",
    "ruff>=0.5",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 88
# Alembic version scripts are autogenerated; don't lint their formatting.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's Depends()/File()/Form() in argument defaults is the idiomatic style.
"**/router.py" = ["B008"]
# Fixture builder embeds SQL DDL as string literals; wrapping hurts readability.
"tests/fixtures/dpm_mini.py" = ["E501"]
